<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pomodoro</title>
  <meta name="description" content="Timer Pomodoro minimalista: gestiona sesiones de trabajo y descanso con notificaciones y sonido.">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --work-color: #e05c45;
      --break-color: #4a9e6b;
      --long-color: #4a76c0;
      --bg: #1a1a1a;
      --surface: #242424;
      --surface2: #2e2e2e;
      --text: #f0f0f0;
      --text-muted: #888;
      --radius: 16px;
    }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 28px;
    }

    h1 { font-size: 18px; font-weight: 500; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; }

    .mode-tabs {
      display: flex;
      background: var(--surface);
      border-radius: 12px;
      padding: 4px;
      gap: 4px;
    }

    .mode-tab {
      border: none;
      background: transparent;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      padding: 7px 16px;
      border-radius: 9px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .mode-tab.active {
      background: var(--accent);
      color: #fff;
    }

    .timer-ring {
      position: relative;
      width: 260px;
      height: 260px;
    }

    .timer-ring svg {
      transform: rotate(-90deg);
      width: 100%;
      height: 100%;
    }

    .ring-bg { fill: none; stroke: var(--surface2); stroke-width: 10; }

    .ring-progress {
      fill: none;
      stroke: var(--accent);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-dasharray: 723;
      stroke-dashoffset: 0;
      transition: stroke-dashoffset 1s linear, stroke 0.4s;
    }

    .timer-display {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .timer-time {
      font-size: 56px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
      letter-spacing: -2px;
      line-height: 1;
    }

    .timer-label {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .btn-main {
      width: 68px;
      height: 68px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn-main:hover { opacity: 0.85; }
    .btn-main:active { transform: scale(0.95); }

    .btn-icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      border: none;
      background: var(--surface);
      color: var(--text-muted);
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s, color 0.15s;
    }

    .btn-icon:hover { background: var(--surface2); color: var(--text); }

    .stats {
      display: flex;
      gap: 32px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    .stat-value {
      font-size: 28px;
      font-weight: 300;
      font-variant-numeric: tabular-nums;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .tomatoes {
      display: flex;
      gap: 6px;
      height: 16px;
    }

    .tomato {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--surface2);
      transition: background 0.3s;
    }

    .tomato.done { background: var(--work-color); }

    .settings {
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      width: 300px;
    }

    .settings-title {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 2px;
    }

    .setting-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .setting-row label {
      font-size: 14px;
      color: var(--text);
    }

    .setting-row input[type=range] {
      flex: 1;
      accent-color: var(--accent);
    }

    .setting-val {
      font-size: 13px;
      color: var(--text-muted);
      width: 28px;
      text-align: right;
    }

    .divider {
      width: 1px;
      height: 40px;
      background: var(--surface2);
    }
  </style>
</head>
<body>

<h1>Pomodoro</h1>

<div class="mode-tabs">
  <button class="mode-tab active" data-mode="work">Trabajo</button>
  <button class="mode-tab" data-mode="break">Descanso</button>
  <button class="mode-tab" data-mode="long">Descanso largo</button>
</div>

<div class="timer-ring">
  <svg viewBox="0 0 260 260">
    <circle class="ring-bg" cx="130" cy="130" r="115"/>
    <circle class="ring-progress" cx="130" cy="130" r="115"/>
  </svg>
  <div class="timer-display">
    <div class="timer-time" id="display">25:00</div>
    <div class="timer-label" id="mode-label">Enfócate</div>
  </div>
</div>

<div class="controls">
  <button class="btn-icon" id="btn-reset" title="Reiniciar">&#8635;</button>
  <button class="btn-main" id="btn-play">&#9654;</button>
  <button class="btn-icon" id="btn-skip" title="Saltar">&#9178;</button>
</div>

<div class="stats">
  <div class="stat">
    <span class="stat-value" id="stat-completed">0</span>
    <span class="stat-label">Pomodoros</span>
  </div>
  <div class="divider"></div>
  <div class="stat">
    <div class="tomatoes" id="tomatoes">
      <div class="tomato"></div>
      <div class="tomato"></div>
      <div class="tomato"></div>
      <div class="tomato"></div>
    </div>
    <span class="stat-label" style="margin-top:4px">Ciclo actual</span>
  </div>
  <div class="divider"></div>
  <div class="stat">
    <span class="stat-value" id="stat-time">0h</span>
    <span class="stat-label">Enfocado</span>
  </div>
</div>

<div class="settings">
  <div class="settings-title">Duración (minutos)</div>
  <div class="setting-row">
    <label>Trabajo</label>
    <input type="range" id="dur-work" min="5" max="60" step="5" value="25">
    <span class="setting-val" id="val-work">25</span>
  </div>
  <div class="setting-row">
    <label>Descanso</label>
    <input type="range" id="dur-break" min="1" max="15" step="1" value="5">
    <span class="setting-val" id="val-break">5</span>
  </div>
  <div class="setting-row">
    <label>Largo</label>
    <input type="range" id="dur-long" min="10" max="30" step="5" value="15">
    <span class="setting-val" id="val-long">15</span>
  </div>
</div>

<script>
const CIRCUMFERENCE = 2 * Math.PI * 115;

const modes = {
  work:  { label: 'Enfócate',       accent: '#e05c45' },
  break: { label: 'Descansa',       accent: '#4a9e6b' },
  long:  { label: 'Buen trabajo',   accent: '#4a76c0' },
};

let state = {
  mode: 'work',
  running: false,
  remaining: 25 * 60,
  total: 25 * 60,
  completed: 0,
  cyclePos: 0,
  focusedSecs: 0,
  interval: null,
};

const durations = { work: 25, break: 5, long: 15 };

const $ = id => document.getElementById(id);
const ring = document.querySelector('.ring-progress');
const display = $('display');
const modeLabel = $('mode-label');
const btnPlay = $('btn-play');
const tomatoEls = document.querySelectorAll('.tomato');

function setAccent(color) {
  document.documentElement.style.setProperty('--accent', color);
}

function fmt(s) {
  const m = Math.floor(s / 60).toString().padStart(2, '0');
  const ss = (s % 60).toString().padStart(2, '0');
  return `${m}:${ss}`;
}

function updateRing() {
  const pct = state.remaining / state.total;
  ring.style.strokeDasharray = CIRCUMFERENCE;
  ring.style.strokeDashoffset = CIRCUMFERENCE * (1 - pct);
  ring.style.stroke = modes[state.mode].accent;
}

function render() {
  display.textContent = fmt(state.remaining);
  modeLabel.textContent = modes[state.mode].label;
  btnPlay.innerHTML = state.running ? '&#9646;&#9646;' : '&#9654;';
  updateRing();
  $('stat-completed').textContent = state.completed;
  const h = Math.floor(state.focusedSecs / 3600);
  const m = Math.floor((state.focusedSecs % 3600) / 60);
  $('stat-time').textContent = h > 0 ? `${h}h ${m}m` : `${m}m`;
  tomatoEls.forEach((el, i) => el.classList.toggle('done', i < state.cyclePos));
}

function switchMode(mode) {
  state.mode = mode;
  state.total = durations[mode] * 60;
  state.remaining = state.total;
  state.running = false;
  clearInterval(state.interval);
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  setAccent(modes[mode].accent);
  render();
}

function tick() {
  if (state.remaining <= 0) {
    clearInterval(state.interval);
    state.running = false;
    notify();
    advance();
    return;
  }
  state.remaining--;
  if (state.mode === 'work') state.focusedSecs++;
  render();
}

function advance() {
  if (state.mode === 'work') {
    state.completed++;
    state.cyclePos = (state.cyclePos + 1) % 4;
    const next = state.cyclePos === 0 ? 'long' : 'break';
    switchMode(next);
  } else {
    switchMode('work');
  }
}

function notify() {
  const msgs = { work: '¡Tiempo! Toma un descanso.', break: '¡A trabajar!', long: '¡De vuelta al trabajo!' };
  if ('Notification' in window && Notification.permission === 'granted') {
    new Notification('Pomodoro', { body: msgs[state.mode], icon: '' });
  }
  try {
    const ctx = new AudioContext();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.setValueAtTime(660, ctx.currentTime + 0.15);
    gain.gain.setValueAtTime(0.4, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    osc.start(); osc.stop(ctx.currentTime + 0.6);
  } catch(e) {}
}

btnPlay.addEventListener('click', () => {
  if ('Notification' in window && Notification.permission === 'default') {
    Notification.requestPermission();
  }
  state.running = !state.running;
  if (state.running) {
    state.interval = setInterval(tick, 1000);
  } else {
    clearInterval(state.interval);
  }
  render();
});

$('btn-reset').addEventListener('click', () => {
  clearInterval(state.interval);
  state.running = false;
  state.remaining = state.total;
  render();
});

$('btn-skip').addEventListener('click', () => {
  clearInterval(state.interval);
  state.running = false;
  advance();
});

document.querySelectorAll('.mode-tab').forEach(tab => {
  tab.addEventListener('click', () => switchMode(tab.dataset.mode));
});

['work', 'break', 'long'].forEach(key => {
  const slider = $(`dur-${key}`);
  const val = $(`val-${key}`);
  slider.addEventListener('input', () => {
    durations[key] = +slider.value;
    val.textContent = slider.value;
    if (state.mode === key && !state.running) {
      state.total = durations[key] * 60;
      state.remaining = state.total;
      render();
    }
  });
});

setAccent(modes['work'].accent);
ring.style.strokeDasharray = CIRCUMFERENCE;
render();
</script>
</body>
</html>
